<!DOCTYPE html>

<meta charset="UTF-8">
<style>
  body { background: #1a1a1a; display: flex; gap: 40px; padding: 40px; align-items: flex-start; flex-wrap: wrap; font-family: sans-serif; color: #fff; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { font-size: 12px; opacity: 0.6; }
  .dark { background: #2C4048; padding: 20px; border-radius: 8px; display: flex; align-items: center; gap: 14px; }
  .light { background: #F8F5F0; padding: 20px; border-radius: 8px; display: flex; align-items: center; gap: 14px; }
  .wordmark { font-family: Georgia, serif; font-size: 18px; }
  .wordmark-light { color: #FAF7F2; }
  .wordmark-dark { color: #1A1410; }
</style>
</head>

            fill="none" stroke="#FAF7F2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M24,77 L22,91" fill="none" stroke="#FAF7F2" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M34,75 L34,91" fill="none" stroke="#FAF7F2" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Small cria — right side, shorter neck -->

            fill="none" stroke="#FAF7F2" stroke-width="3.5" stroke-linecap="round"/>

            fill="none" stroke="#FAF7F2" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M57,30 L55,24 L61,29"
            fill="none" stroke="#FAF7F2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M56,81 L54,92" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>
      <path d="M65,79 L65,92" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <span class="wordmark wordmark-light">Northwest Camelid Foundation</span>
  </div>
</div>
